<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Настройки</title>

  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/settings.css">
</head>
<body>

<div class="layout">
  <aside id="sidebar"></aside>

  <div class="main-content">
    <header class="header">
      <h1>Настройки планирования</h1>
    </header>

    <main class="settings-page">

      <h2>Формула дня</h2>

<label>Вес аналогичного дня</label>
<input id="sameDay" type="number" step="0.1">

<label>Вес среднего по дню недели</label>
<input id="weekdayAvg" type="number" step="0.1">

      <h2>Источники данных</h2>

<label>Вес прошлого месяца</label>
<input id="prevWeight" type="number" step="0.1">

<label>Вес аналогичного месяца прошлого года</label>
<input id="lastYearWeight" type="number" step="0.1">

      <h2>Настройки гостей (GC)</h2>

<label>Режим расчёта</label>
<select id="gcMode">
  <option value="historical">По историческим данным</option>
  <option value="fixed">Фиксированный средний чек</option>
</select>

<label>Средний чек по умолчанию</label>
<input id="avgCheck" type="number">

      <button id="saveBtn">Сохранить настройки</button>

      <div id="status"></div>

    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/layout.js"></script>
<script src="../js/settings.js"></script>

</body>
</html>
