<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Настройки</title>

  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/settings.css">
</head>
<body>

<div class="layout">
  <aside id="sidebar"></aside>

  <div class="main-content">
    <header class="header">
      <h1>Настройки планирования</h1>
    </header>

    <main class="settings-page">
      <!-- Блок: режим планирования -->
      <section class="card">
        <h2>Основные настройки</h2>

        <label for="planningMode">Режим планирования</label>
        <select id="planningMode">
          <option value="prev_month_only">Только по предыдущему месяцу</option>
        </select>
      </section>

      <!-- Блок: расчет GC -->
      <section class="card">
        <h2>Настройки гостей (GC)</h2>

        <label for="gcMode">Режим расчёта</label>
        <select id="gcMode">
          <option value="historical">По историческим данным</option>
          <option value="fixed">По фиксированному среднему чеку</option>
        </select>

        <label for="avgCheck">Средний чек по умолчанию</label>
        <input id="avgCheck" type="number" min="0" step="1">
      </section>

      <!-- Блок: коэффициенты по дням -->
      <section class="card">
        <h2>Коэффициенты дней</h2>

        <label for="weekdayMultiplier">Коэффициент будних дней</label>
        <input id="weekdayMultiplier" type="number" min="0" step="0.01">

        <label for="weekendMultiplier">Коэффициент выходных дней</label>
        <input id="weekendMultiplier" type="number" min="0" step="0.01">
      </section>

      <!-- Блок: праздничные дни -->
      <section class="card">
        <h2>Праздничные дни</h2>

        <label for="holidayEnabled">Учитывать праздничные дни</label>
        <select id="holidayEnabled">
          <option value="true">Да</option>
          <option value="false">Нет</option>
        </select>

        <label for="holidayMultiplier">Коэффициент праздничного дня</label>
        <input id="holidayMultiplier" type="number" min="0" step="0.01">

        <label for="preHolidayMultiplier">Коэффициент предпраздничного дня</label>
        <input id="preHolidayMultiplier" type="number" min="0" step="0.01">

        <label for="postHolidayMultiplier">Коэффициент после праздника</label>
        <input id="postHolidayMultiplier" type="number" min="0" step="0.01">
      </section>

      <!-- Кнопка сохранения -->
      <button id="saveBtn" type="button">Сохранить настройки</button>

      <!-- Статус -->
      <div id="status"></div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/layout.js"></script>
<script src="js/settings.js"></script>

</body>
</html>
