<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>План по дням</title>

  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/calendar.css">
</head>
<body>
<div class="layout">
  <aside id="sidebar"></aside>

  <div class="main-content">
    <header class="header">
      <div class="header-content">
        <h1>План по дням</h1>
        <p>Детализация плана по выбранному дню</p>
      </div>
    </header>

    <main class="page">

      <!-- Фильтр -->
      <div class="card">
        <h2>Фильтр</h2>

        <div class="filter-grid">
          <input type="number" id="year" value="2026">
          <input type="number" id="month" value="4" min="1" max="12">
          <input type="number" id="day" value="1" min="1" max="31">

          <button id="loadBtn">Показать</button>
        </div>

        <div id="status"></div>
      </div>

      <!-- Summary -->
      <div class="card">
        <h2>Итог за день</h2>

        <div class="summary-grid">
          <div>
            <span>Финальный план</span>
            <strong id="totalToo">—</strong>
          </div>

          <div>
            <span>Гости</span>
            <strong id="totalGc">—</strong>
          </div>

          <div>
            <span>Средний чек</span>
            <strong id="avgCheck">—</strong>
          </div>
        </div>
      </div>

      <!-- Таблица -->
      <div class="card">
        <h2>Почасовой план</h2>
        <div class="table-actions">
             <button id="exportExcelBtn">Excel-ге экспорт</button>
        </div>

       <table id="hourlyPlanTable">
  <thead>
    <tr>
      <th>Час</th>
      <th>TOO</th>
      <th>GC</th>
      <th>Ср. чек</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/layout.js"></script>
<script src="js/calendar.js"></script>
</body>
</html>
